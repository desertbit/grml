version: 3
project: sample-host

# Host-side counterpart to grml.yaml. Run with:
#   grml -f grml.host.yaml <target>
# Use it for tasks that must run on the host (devcontainer lifecycle,
# host docker, host-only tooling) rather than inside the dev environment.

env:
    VERSION:  1.0.0
    DESTBIN:  ${PROJECT}-${VERSION}
    BINDIR:   ${ROOT}/bin

interpreter: bash

commands:
    docker-build:
        help: cross-compile ${DESTBIN} for linux-amd64 in a docker container
        exec: |
            mkdir -p "${BINDIR}"
            docker run --rm \
                -v "${ROOT}":/work -w /work \
                -e CGO_ENABLED=0 -e GOOS=linux -e GOARCH=amd64 \
                golang:alpine \
                    go build -o "bin/${DESTBIN}-linux-amd64"

    shell:
        help: open a shell inside the devcontainer
        exec: |
            devcontainer up --workspace-folder "${ROOT}"
            devcontainer exec --workspace-folder "${ROOT}" bash
