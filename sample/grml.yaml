version: 2
project: sample

# Environment variables. ${VAR} expands from previously declared
# entries and the implicit ROOT, PROJECT, NUMCPU.
env:
    VERSION: 1.0.0
    DESTBIN: ${PROJECT}-${VERSION}
    BUILDDIR: ${ROOT}/build
    BINDIR: ${ROOT}/bin

# User-tweakable options. Bools become check options, lists become
# single-choice options. Each is exposed as an env var inside exec.
#   options          -> show current values
#   options check    -> toggle bool options
#   options set X    -> pick a value for choice option X
options:
    debug: false
    runopts:
        - world
        - mars
        - moon

# 'sh' (default) or 'bash'.
interpreter: bash

# Shell snippets sourced before every exec body. They share the
# command's environment and can define helper functions.
import:
    - grml.sh

commands:
    clean:
        help: remove ${BUILDDIR} and ${BINDIR}
        alias: [c]
        exec: |
            rm -rf "${BUILDDIR}" "${BINDIR}"

    go:
        help: go module helpers
        commands:
            get:
                help: download dependencies
                exec: |
                    go get ./...
            update:
                help: update dependencies
                exec: |
                    go get -u ./...
            tidy:
                help: clean up go.mod
                exec: |
                    go mod tidy -v

    # 'resources' shows a relative dep: '.images' resolves to
    # 'resources.images' (its own child) without hard-coding the parent.
    resources:
        help: prepare build-time resources
        deps:
            - .images
        exec: |
            touch "${BUILDDIR}/resources"
        commands:
            images:
                help: prepare image resources
                exec: |
                    touch "${BUILDDIR}/images"

    build:
        help: build ${DESTBIN} into ${BINDIR}
        alias: [b]
        deps:
            - resources
        exec: |
            go_build
        commands:
            # No exec body — only runs its deps, in order.
            run:
                help: build then run ${DESTBIN}
                deps:
                    - build
                    - run

    run:
        help: run ${DESTBIN} with the configured greeting
        exec: |
            "${BINDIR}/${DESTBIN}" "${runopts}"

    # 'args' declares positional arguments. Each is passed to exec
    # as an env var of the same name.
    deploy:
        help: deploy ${DESTBIN} over ssh
        args:
            - host
            - user
        exec: |
            echo "deploying ${DESTBIN} to ${user}@${host}"

    # 'include' loads the rest of this command's definition (help,
    # exec, nested commands, ...) from a separate YAML file.
    release:
        include: commands/release.yaml
