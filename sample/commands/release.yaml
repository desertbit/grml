# An included subgrml file can declare its own 'env'. values layer on
# top of the root env (root values stay visible) and override root keys
# only for commands defined in this file.
env:
    DESTBIN: ${PROJECT}-${VERSION}-release
    RELEASE_NOTE: ${PROJECT} ${VERSION} release

# Per-include options have their own UI under this command. Manage from
# the shell with:
#   release options              -> show release scope's options
#   release options check        -> toggle bool options (e.g. 'dryrun')
#   release options set channel  -> pick a value for the choice option
# Names live in this scope only — the root manifest's 'debug' is unrelated
# and another subgrml could declare its own 'dryrun' without colliding.
options:
    dryrun: false
    channel:
        - stable
        - beta
        - nightly

# Per-include imports are sourced only when running commands in this file.
# Paths are relative to this file's directory, so 'release.sh' resolves
# to <ROOT>/commands/release.sh.
import:
    - release.sh

help: cut a ${VERSION} release
exec: |
    release_banner
commands:
    tag:
        help: tag the git release
        exec: |
            echo "git tag -a v${VERSION} (${RELEASE_NOTE})"
    publish:
        help: publish ${DESTBIN} artifacts
        deps:
            # '~.tag' resolves to this include's 'tag' command — the file
            # does not need to know how the root manifest names it.
            - ~.tag
        exec: |
            release_banner
            if grml_option dryrun; then
                echo "(dry-run) would publish ${BINDIR}/${DESTBIN} to ${channel}"
            else
                echo "publishing ${BINDIR}/${DESTBIN} to ${channel}"
            fi
