# An included subgrml file can declare its own 'env'. values layer on
# top of the root env (root values stay visible) and override root keys
# only for commands defined in this file.
env:
    DESTBIN: ${PROJECT}-${VERSION}-release
    RELEASE_NOTE: ${PROJECT} ${VERSION} release

help: cut a ${VERSION} release
exec: |
    echo "${RELEASE_NOTE}"
commands:
    tag:
        help: tag the git release
        exec: |
            echo "git tag -a v${VERSION} (${RELEASE_NOTE})"
    publish:
        help: publish ${DESTBIN} artifacts
        deps:
            # '~.tag' resolves to this include's 'tag' command — the file
            # does not need to know how the root manifest names it.
            - ~.tag
        exec: |
            echo "publishing ${BINDIR}/${DESTBIN}"
